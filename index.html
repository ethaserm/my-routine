<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Routines</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --morning: #FF8C42;
  --after: #4E8FFF;
  --bg: #0D0D0F;
  --surface: #16161A;
  --surface2: #1E1E24;
  --border: rgba(255,255,255,0.07);
  --text: #F2F2F4;
  --muted: rgba(242,242,244,0.45);
  --done-text: rgba(242,242,244,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); padding: 2rem 1rem 4rem; }
.wrap { max-width: 440px; margin: 0 auto; }

.topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
.title-block { display: flex; flex-direction: column; gap: 6px; }
.app-title { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; letter-spacing: -0.04em; line-height: 0.95; background: linear-gradient(110deg, var(--morning) 0%, #FFD580 40%, var(--after) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.app-sub { font-size: 12px; font-weight: 400; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.streak-pill { font-size: 12px; font-weight: 500; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 5px 14px; border-radius: 100px; display: flex; align-items: center; gap: 6px; }

.tabs { display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 5px; margin-bottom: 1.5rem; }
.tab { flex: 1; text-align: center; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 12px; border-radius: 10px; cursor: pointer; color: var(--muted); transition: all 0.2s; border: none; background: none; letter-spacing: 0.01em; }
.tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

.date-nav { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 2rem; overflow: hidden; }
.dbtn { background: none; border: none; color: var(--muted); font-size: 16px; padding: 12px 18px; cursor: pointer; transition: color 0.15s, background 0.15s; }
.dbtn:hover { color: var(--text); background: var(--surface2); }
.dlbl { flex: 1; text-align: center; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }

.sec-header { display: flex; align-items: center; justify-content: space-between; margin: 2rem 0 12px; }
.sec-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.sec-label.morning { color: var(--morning); }
.sec-label.after { color: var(--after); }
.sec-count { font-size: 12px; color: var(--muted); }

.pbw { height: 3px; background: var(--surface2); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.pb { height: 100%; border-radius: 2px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.pb.morning { background: linear-gradient(90deg, var(--morning), #FFBE7A); }
.pb.after { background: linear-gradient(90deg, var(--after), #84B5FF); }

.task { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s, transform 0.1s; position: relative; overflow: hidden; }
.task::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; opacity: 0; transition: opacity 0.2s; }
.task.m::before { background: var(--morning); }
.task.a::before { background: var(--after); }
.task.done::before { opacity: 1; }
.task:hover { background: var(--surface2); transform: translateX(2px); }
.task.off { opacity: 0.25; pointer-events: none; }
.ck { width: 24px; height: 24px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
.task.done.m .ck { background: var(--morning); border-color: var(--morning); box-shadow: 0 0 12px rgba(255,140,66,0.4); }
.task.done.a .ck { background: var(--after); border-color: var(--after); box-shadow: 0 0 12px rgba(78,143,255,0.4); }
.cm { display: none; }
.task.done .cm { display: block; }
.tlbl { font-size: 14px; color: var(--text); flex: 1; line-height: 1.4; transition: color 0.2s; }
.task.done .tlbl { color: var(--done-text); text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.12); }
.tnum { font-size: 11px; color: rgba(255,255,255,0.15); min-width: 14px; font-family: 'Syne', sans-serif; font-weight: 700; }
.del-btn { background: none; border: none; color: rgba(255,255,255,0.15); font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; transition: color 0.15s; }
.del-btn:hover { color: #ff5f5f; }
.bdg { font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 100px; flex-shrink: 0; }
.bdg.active { background: rgba(78,143,255,0.15); color: #84B5FF; }
.bdg.rest { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.25); }
.win { text-align: center; padding: 12px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.05em; display: none; border-radius: 12px; margin-top: 6px; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.win.morning { background: rgba(255,140,66,0.1); color: var(--morning); }
.win.after { background: rgba(78,143,255,0.1); color: var(--after); }

/* Add task UI */
.add-section { margin-top: 2.5rem; }
.add-section-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.add-row { display: flex; gap: 8px; margin-bottom: 8px; }
.add-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
.add-input:focus { border-color: rgba(255,255,255,0.2); }
.add-input::placeholder { color: var(--muted); }
.add-select { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; cursor: pointer; }
.add-select option { background: #1E1E24; }
.add-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s, border-color 0.15s; white-space: nowrap; }
.add-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }

/* Stats */
.stats-panel { display: none; }
.stats-panel.visible { display: block; }
.stat-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 12px; text-align: center; }
.stat-val { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-val.m { color: var(--morning); }
.stat-val.a { color: var(--after); }
.stat-val.streak { background: linear-gradient(110deg, var(--morning), var(--after)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 16px 12px; }
.chart-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.chart-legend { display: flex; gap: 12px; }
.legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.legend-item { font-size: 11px; color: var(--muted); display: flex; align-items: center; }
canvas#chart { width: 100%; display: block; }
.chart-empty { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 13px; }

@keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
</style>

<div class="wrap">
  <div class="topbar">
    <div class="title-block">
      <div class="app-title">Daily<br>Routines</div>
      <div class="app-sub">Morning &amp; After School</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
      <div class="streak-pill">🔥 <span id="sb">0 day streak</span></div>
      <span id="sync-status" style="font-size:10px;color:var(--muted);letter-spacing:0.04em;">Loading...</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-tracker" id="tab-tracker-btn">Tracker</button>
    <button class="tab" id="tab-stats" id="tab-stats-btn">Progress</button>
  </div>

  <div id="panel-tracker">
    <div class="date-nav">
      <button class="dbtn" id="btn-prev">&#8592;</button>
      <span class="dlbl" id="dl"></span>
      <button class="dbtn" id="btn-next">&#8594;</button>
    </div>

    <div class="sec-header"><span class="sec-label morning">Morning</span><span class="sec-count" id="mpl">0 / 7</span></div>
    <div class="pbw"><div class="pb morning" id="mpb" style="width:0%"></div></div>
    <div id="ml"></div>
    <div class="win morning" id="mw">☀️ Morning smashed!</div>

    <div class="sec-header"><span class="sec-label after">After school</span><span class="sec-count" id="apl">0 / 9</span></div>
    <div class="pbw"><div class="pb after" id="apb" style="width:0%"></div></div>
    <div id="al"></div>
    <div class="win after" id="aw">🌙 Evening routine done — great work!</div>

    <!-- Add task -->
    <div class="add-section">
      <div class="add-section-title">Add a task</div>
      <div class="add-row">
        <input class="add-input" id="new-task-input" type="text" placeholder="Task name..." maxlength="80">
        <select class="add-select" id="new-task-section">
          <option value="m">Morning</option>
          <option value="a">After</option>
        </select>
        <button class="add-btn" id="btn-add-task">Add</button>
      </div>
    </div>
  </div>

  <div id="panel-stats" class="stats-panel">
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-val streak" id="st-streak">0</div><div class="stat-lbl">Day streak</div></div>
      <div class="stat-card"><div class="stat-val m" id="st-best">0</div><div class="stat-lbl">Best streak</div></div>
      <div class="stat-card"><div class="stat-val a" id="st-days">0</div><div class="stat-lbl">Days logged</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">
        Tasks completed per day
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--morning)"></span>Morning</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--after)"></span>After</span>
        </div>
      </div>
      <canvas id="chart" height="200"></canvas>
      <div class="chart-empty" id="chart-empty" style="display:none">No data yet — start checking off tasks!</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgYU_JnbWCBpeAUlLesgD_9V5F0IDmgM",
  authDomain: "dailyroutine-146d0.firebaseapp.com",
  projectId: "dailyroutine-146d0",
  storageBucket: "dailyroutine-146d0.firebasestorage.app",
  messagingSenderId: "531875299744",
  appId: "1:531875299744:web:b75a25e27cdf20f5a1e4c5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_ID = "main";

// Base tasks — never mutated, extras stored separately
const MT_BASE=[{l:"Wake up on first alarm"},{l:"Get dressed"},{l:"Brush teeth"},{l:"Clean face"},{l:"Do hair"},{l:"Make bed"},{l:"Have breakfast"}];
const AT_BASE=[{l:"Do 2 preps if you have them"},{l:"10 mins on the hockey mat"},{l:"Make tomorrow's video (+ more if time)"},{l:"Workout",wo:true},{l:"Pack bags, lay out clothes for tomorrow"},{l:"Have a shower"},{l:"Clean face"},{l:"Brush teeth"},{l:"Get to bed — don't stay up late"}];
const WD=[1,3,4,6,0];
const KEY='rt_v6';
let data={},off=0,activeTab='tracker';
let MT=[...MT_BASE], AT=[...AT_BASE];

function dk(o){const d=new Date();d.setDate(d.getDate()+o);return d.toISOString().slice(0,10)}
function dlbl(o){const d=new Date();d.setDate(d.getDate()+o);if(o===0)return'Today — '+d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});if(o===-1)return'Yesterday — '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'})}
function isWD(o){const d=new Date();d.setDate(d.getDate()+o);return WD.includes(d.getDay())}

// Sync status indicator
function setSyncStatus(status){
  const el=document.getElementById('sync-status');
  if(!el)return;
  if(status==='saving'||status==='syncing...'){el.textContent='Syncing...';el.style.color='var(--muted)';}
  else if(status==='saved'){el.textContent='Synced ✓';el.style.color='#1D9E75';}
  else if(status==='error'){el.textContent='Offline — saved locally';el.style.color='#FF8C42';}
}

let saveTimer=null;
async function save(){
  const extraM=MT.slice(MT_BASE.length);
  const extraA=AT.slice(AT_BASE.length);
  // Always save to localStorage as backup
  try{localStorage.setItem(KEY,JSON.stringify({data,extraM,extraA}));}catch(e){}
  // Debounced Firestore save
  clearTimeout(saveTimer);
  setSyncStatus('saving');
  saveTimer=setTimeout(async()=>{
    try{
      await setDoc(doc(db,'routines',DOC_ID),{data,extraM,extraA});
      setSyncStatus('saved');
    }catch(e){
      console.warn('Firestore save failed, using localStorage',e);
      setSyncStatus('error');
    }
  },800);
}

async function load(){
  // Step 1: load from localStorage immediately so tasks render right away
  try{
    const raw=JSON.parse(localStorage.getItem(KEY)||'{}');
    data=raw.data||{};
    if(raw.extraM)MT=[...MT_BASE,...raw.extraM];
    if(raw.extraA)AT=[...AT_BASE,...raw.extraA];
  }catch(e){data={};}

  // Step 2: render immediately so the UI is never blank
  render();
  setSyncStatus('syncing...');

  // Step 3: try Firestore in background and update if we get fresher data
  try{
    const snap=await getDoc(doc(db,'routines',DOC_ID));
    if(snap.exists()){
      const raw=snap.data();
      data=raw.data||{};
      MT=[...MT_BASE,...(raw.extraM||[])];
      AT=[...AT_BASE,...(raw.extraA||[])];
      try{localStorage.setItem(KEY,JSON.stringify({data,extraM:raw.extraM||[],extraA:raw.extraA||[]}));}catch(e){}
      render();
      setSyncStatus('saved');
    } else {
      setSyncStatus('saved');
    }
  }catch(e){
    console.warn('Firestore unavailable, using local data',e);
    setSyncStatus('error');
  }
}

function getStreak(){
  let s=0,o=0;
  while(true){
    const k=dk(o),d=data[k];
    if(!d)break;
    const w=isWD(o),mt=MT.length,at=AT.filter(t=>!t.wo||w).length;
    const md=(d.m||[]).filter(Boolean).length,ad=(d.a||[]).filter((v,i)=>AT[i]&&AT[i].wo&&!w?true:v).length;
    if(md===mt&&ad===at){s++;o--;}else break;
  }
  return s;
}
function getBestStreak(){
  const keys=Object.keys(data).sort();
  let best=0,cur=0;
  for(const k of keys){
    const d=data[k],dayObj=new Date(k),w=WD.includes(dayObj.getDay());
    const mt=MT.length,at=AT.filter(t=>!t.wo||w).length;
    const md=(d.m||[]).filter(Boolean).length,ad=(d.a||[]).filter((v,i)=>AT[i]&&AT[i].wo&&!w?true:v).length;
    if(md===mt&&ad===at){cur++;best=Math.max(best,cur);}else cur=0;
  }
  return best;
}

function getDayData(){
  const days=[];
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    if(data[k]){
      const w=WD.includes(d.getDay());
      const md=(data[k].m||[]).filter(Boolean).length;
      const ad=(data[k].a||[]).filter((v,j)=>AT[j]&&AT[j].wo&&!w?false:v).length;
      days.push({k,md,ad,dayObj:new Date(k)});
    }
  }
  return days;
}

function getMaxPossible(){
  // max tasks on a workout day
  return MT.length + AT.length;
}

function switchTab(t){
  activeTab=t;
  document.getElementById('tab-tracker').classList.toggle('active',t==='tracker');
  document.getElementById('tab-stats').classList.toggle('active',t==='stats');
  document.getElementById('panel-tracker').style.display=t==='tracker'?'block':'none';
  document.getElementById('panel-stats').classList.toggle('visible',t==='stats');
  if(t==='stats')renderStats();
}

function renderStats(){
  document.getElementById('st-streak').textContent=getStreak();
  document.getElementById('st-best').textContent=getBestStreak();
  document.getElementById('st-days').textContent=Object.keys(data).length;
  drawChart();
}

function drawChart(){
  const days=getDayData();
  const canvas=document.getElementById('chart');
  const empty=document.getElementById('chart-empty');
  if(days.length===0){canvas.style.display='none';empty.style.display='block';return;}
  canvas.style.display='block';empty.style.display='none';

  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.offsetWidth;
  const H=230;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const maxVal=getMaxPossible();
  const pad={top:14,right:10,bottom:46,left:34};
  const cw=W-pad.left-pad.right;
  const ch=H-pad.top-pad.bottom;
  const n=days.length;
  const barW=Math.max(5,Math.min(28,Math.floor(cw/n)-3));
  const gap=cw/n;

  // Y axis
  const step=maxVal<=8?1:maxVal<=16?2:maxVal<=24?3:4;
  ctx.font='10px DM Sans, sans-serif';
  for(let v=0;v<=maxVal;v+=step){
    const y=pad.top+ch*(1-(v/maxVal));
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillStyle='rgba(242,242,244,0.38)';
    ctx.textAlign='right';
    ctx.fillText(v,pad.left-4,y+3.5);
  }

  // Bars
  days.forEach((d,i)=>{
    const barX=pad.left+i*gap+(gap-barW)/2;
    const aH=ch*(d.ad/maxVal);
    const mH=ch*(d.md/maxVal);
    const stackH=mH+aH;

    if(d.ad>0){
      const aY=pad.top+ch-aH;
      ctx.fillStyle='#4E8FFF';
      roundRect(ctx,barX,aY,barW,aH,d.md>0?[0,0,4,4]:[4,4,4,4]);
      ctx.fill();
    }
    if(d.md>0){
      const mY=pad.top+ch-stackH;
      ctx.fillStyle='#FF8C42';
      roundRect(ctx,barX,mY,barW,mH,d.ad>0?[4,4,0,0]:[4,4,4,4]);
      ctx.fill();
    }
    const total=d.md+d.ad;
    if(total>0){
      ctx.fillStyle='rgba(242,242,244,0.5)';
      ctx.font='bold 9px DM Sans, sans-serif';
      ctx.textAlign='center';
      ctx.fillText(total,barX+barW/2,pad.top+ch-stackH-4);
    }

    const dayName=d.dayObj.toLocaleDateString('en-GB',{weekday:'short'});
    const dateNum=d.dayObj.getDate();
    const showLabel=n<=10||(n<=20&&i%2===0)||(i%3===0);
    if(showLabel){
      const lx=barX+barW/2;
      ctx.fillStyle='rgba(242,242,244,0.45)';
      ctx.font='9px DM Sans, sans-serif';
      ctx.textAlign='center';
      ctx.fillText(dayName,lx,H-pad.bottom+13);
      ctx.fillStyle='rgba(242,242,244,0.22)';
      ctx.fillText(dateNum,lx,H-pad.bottom+25);
    }
  });
}

function roundRect(ctx,x,y,w,h,r){
  if(typeof r==='number')r=[r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x+r[0],y);
  ctx.lineTo(x+w-r[1],y);ctx.arcTo(x+w,y,x+w,y+r[1],r[1]);
  ctx.lineTo(x+w,y+h-r[2]);ctx.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
  ctx.lineTo(x+r[3],y+h);ctx.arcTo(x,y+h,x,y+h-r[3],r[3]);
  ctx.lineTo(x,y+r[0]);ctx.arcTo(x,y,x+r[0],y,r[0]);
  ctx.closePath();
}

function addTask(){
  const inp=document.getElementById('new-task-input');
  const sec=document.getElementById('new-task-section').value;
  const label=inp.value.trim();
  if(!label)return;
  if(sec==='m') MT.push({l:label,custom:true});
  else AT.push({l:label,custom:true});
  // extend all existing day states to include new task (unchecked)
  for(const k in data){
    if(sec==='m') data[k].m=(data[k].m||[]).concat([false]);
    else data[k].a=(data[k].a||[]).concat([false]);
  }
  inp.value='';
  save();
  render();
}

function deleteTask(sec,idx){
  if(sec==='m'){
    if(idx<MT_BASE.length)return; // can't delete base tasks
    MT.splice(idx,1);
    for(const k in data){if(data[k].m)data[k].m.splice(idx,1);}
  } else {
    if(idx<AT_BASE.length)return;
    AT.splice(idx,1);
    for(const k in data){if(data[k].a)data[k].a.splice(idx,1);}
  }
  save();render();
}

function renderSec(tasks,state,id,cls,isW){
  const el=document.getElementById(id+'l');el.innerHTML='';
  let vc=0,vd=0,n=0;
  tasks.forEach((t,i)=>{
    const dis=t.wo&&!isW;
    if(!dis)vc++;
    const done=state[i]||false;
    if(!dis&&done)vd++;
    if(!dis)n++;
    const div=document.createElement('div');
    div.className='task '+cls+(done?' done':'')+(dis?' off':'');
    let badge='';
    if(t.wo)badge=`<span class="bdg ${isW?'active':'rest'}">${isW?'Today':'Rest day'}</span>`;
    const delBtn=t.custom?`<button class="del-btn" title="Remove task" onclick="event.stopPropagation();deleteTask('${id}',${i})">×</button>`:'';
    div.innerHTML=`<span class="tnum">${dis?'':n}</span><div class="ck"><svg class="cm" width="11" height="8" viewBox="0 0 11 8"><path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="tlbl">${t.l}</span>${badge}${delBtn}`;
    if(!dis)div.onclick=()=>tog(id,i);
    el.appendChild(div);
  });
  const pct=vc?Math.round(vd/vc*100):0;
  document.getElementById(id+'pb').style.width=pct+'%';
  document.getElementById(id+'pl').textContent=vd+' / '+vc;
  document.getElementById(id+'w').style.display=(vd===vc&&vc>0)?'block':'none';
}

function render(){
  const k=dk(off);
  if(!data[k])data[k]={m:Array(MT.length).fill(false),a:Array(AT.length).fill(false)};
  // ensure arrays are long enough
  while(data[k].m.length<MT.length)data[k].m.push(false);
  while(data[k].a.length<AT.length)data[k].a.push(false);
  const d=data[k],w=isWD(off);
  document.getElementById('dl').textContent=dlbl(off);
  const s=getStreak();
  document.getElementById('sb').textContent=s+' day'+(s===1?'':' ')+'streak';
  renderSec(MT,d.m,'m','m',w);
  renderSec(AT,d.a,'a','a',w);
  if(activeTab==='stats')renderStats();
}

function tog(sec,i){
  const k=dk(off);
  if(!data[k])data[k]={m:Array(MT.length).fill(false),a:Array(AT.length).fill(false)};
  const arr=sec==='m'?data[k].m:data[k].a;
  arr[i]=!arr[i];
  save();render();
}
function go(dir){if(off+dir>0)return;off+=dir;render();}

// Wire up all button event listeners (avoids module scope issues with onclick)
document.getElementById('tab-tracker-btn').addEventListener('click',()=>switchTab('tracker'));
document.getElementById('tab-stats-btn').addEventListener('click',()=>switchTab('stats'));
document.getElementById('btn-prev').addEventListener('click',()=>go(-1));
document.getElementById('btn-next').addEventListener('click',()=>go(1));
document.getElementById('btn-add-task').addEventListener('click',addTask);
document.getElementById('new-task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

// deleteTask still needs to be on window since it's called from dynamic innerHTML
window.deleteTask = deleteTask;

// Boot — load() already calls render() internally
load();
</script>
</body>
</html>
